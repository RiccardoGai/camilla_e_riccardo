<main class="flex h-screen w-full items-center justify-center bg-[#f1ebe5] p-4">
  <div
    class="mx-auto w-full max-w-md animate-[fadeIn_1.5s_ease-in-out] rounded-xl bg-white/50 p-8 text-center text-[#5d5d5d] shadow-2xl backdrop-blur-lg md:p-12"
  >
    <div class="mb-5 flex items-center justify-center">
      <img [src]="logoUrl" alt="Logo C&R" class="h-20 w-auto" />
    </div>

    <div class="mb-10">
      <h1 class="text-beige flex flex-col items-center text-5xl leading-none">
        <span class="flex flex-wrap justify-center gap-3 uppercase">
          <span>Camilla</span>
          <span class="font-cursive inline-block self-end align-baseline text-[6rem] leading-[0.3] lowercase"
            >e</span
          >
        </span>

        <span class="uppercase">Riccardo</span>
      </h1>
      <p class="mt-2 text-xl tracking-widest text-gray-500">20 | 06 | 2026</p>
    </div>

    <div>
      <h2 class="text-beige mb-3 text-3xl">Benvenuti</h2>
      <p class="mb-8 text-gray-600">
        Per accedere al sito, inserisci la password che hai ricevuto con l'invito.
      </p>
      <form (submit)="onSubmit($event)">
        <div class="relative w-full">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            placeholder="Password"
            class="border-green-light/50 w-full border-b bg-transparent px-4 py-2 pr-10 text-center transition-colors duration-300 outline-none placeholder:text-gray-400 focus:border-[#8d7a6e]"
            [class.border-red-500]="hasError()"
            [class.focus:border-red-500]="hasError()"
            required
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="hover:text-beige absolute top-1/2 right-2 -translate-y-1/2 p-1 text-gray-400 transition-colors focus:outline-none"
            title="Mostra/Nascondi password"
          >
            @if (showPassword()) {
              <!-- Eye Slash Icon (Hide) -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="h-5 w-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
                />
              </svg>
            } @else {
              <!-- Eye Icon (Show) -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="h-5 w-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                />
              </svg>
            }
          </button>
        </div>

        @if (hasError()) {
          <p class="mt-2 text-sm text-red-600">Password non corretta. Riprova.</p>
        }
        <button
          type="submit"
          class="bg-green-light mt-8 w-full rounded-md py-3 tracking-widest text-white uppercase shadow-lg transition-all duration-300 hover:-translate-y-0.5 hover:bg-[#838a6c] hover:shadow-xl"
        >
          Entra
        </button>
      </form>
    </div>
  </div>
</main>
