<!-- STAY -->
<section id="accomodation" class="py-20 md:py-32">
  <div class="mx-auto max-w-4xl px-6 text-center">
    <div appAnimateOnScroll class="section-to-animate">
      <h2 class="font-adore text-beige mb-6 text-5xl">Dove Soggiornare</h2>
      <p class="text-gray mb-16 italic">
        Per chi desidera pernottare, abbiamo selezionato alcune proposte nelle vicinanze che ci sentiamo di
        consigliare! La prenotazione è a cura di ciascun ospite — vi auguriamo un buon soggiorno!
      </p>
      <div class="grid grid-cols-1 gap-12 md:grid-cols-3">
        @for (hotel of hotels; track hotel.name) {
          <div class="flex flex-col items-center">
            <ng-icon [name]="hotel.icon" size="48px" class="!text-green-light mb-4" />
            <h3 class="text-beige mb-3 text-2xl">{{ hotel.name }}</h3>
            <a
              [href]="hotel.link"
              target="_blank"
              class="text-gray hover:text-beige text-sm underline-offset-4 transition-colors hover:underline"
              >Visita il sito</a
            >
          </div>
        }
      </div>
    </div>
  </div>
</section>
