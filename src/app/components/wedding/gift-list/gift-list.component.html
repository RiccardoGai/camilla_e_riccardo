<!-- WEDDING LIST -->
<section id="gift" appAnimateOnScroll class="section-to-animate py-20 md:py-32">
  <div class="mx-auto max-w-3xl px-6 text-center">
    <h2 class="text-beige mb-8 text-5xl">Lista Nozze</h2>
    <p class="mb-8 text-lg leading-relaxed italic">
      La vostra presenza sarà per noi il regalo più grande. Ma se desiderate contribuire a realizzare i nostri
      sogni, potete farlo con un pensiero per il nostro viaggio di nozze.
    </p>
    <div class="border-green-light/30 inline-block rounded-md border bg-white/50 px-8 py-4 text-lg">
      <p class="tracking-widest">IBAN</p>
      <div class="mt-1 flex items-center gap-4">
        <p class="text-beige select-all">{{ iban() }}</p>
        <button
          (click)="copyIban()"
          title="Copia IBAN"
          class="hover:text-beige text-green-light p-1 transition-colors"
        >
          @if (copyState() === 'copied') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="h-5 w-5 text-green-600"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="h-5 w-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75"
              />
            </svg>
          }
        </button>
      </div>
      <p class="mt-2 text-sm">Intestato a: Camilla & Riccardo</p>
    </div>
    <p class="text-beige mt-12 text-3xl italic">Grazie di cuore!</p>
  </div>
</section>
