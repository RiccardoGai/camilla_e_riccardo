<nav class="w-full transform transition-all duration-500" [class.-translate-y-full]="!isVisible()">
  <div class="relative z-50 mx-auto my-4 max-w-5xl px-4 sm:px-6 lg:px-8">
    <div class="rounded-full border border-white/40 bg-white/80 px-6 shadow-lg backdrop-blur-md">
      <div class="flex h-16 items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center">
          <a href="#home" class="flex flex-shrink-0" (click)="scrollTo($event, '#home')">
            <app-logo class="text-gray" size="2.5rem" ariaLabel="Logo Camilla e Riccardo"></app-logo>
          </a>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden lg:block">
          <div class="ml-10 flex items-baseline space-x-1">
            @for (link of navLinks; track link.href) {
              <a
                [href]="link.href"
                (click)="scrollTo($event, link.href)"
                class="hover:text-beige hover:bg-beige-light/50 text-gray rounded-full px-3 py-2 text-sm font-medium tracking-wider whitespace-nowrap uppercase transition-colors duration-300"
                >{{ link.label }}</a
              >
            }
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <div class="flex items-center lg:hidden">
          <button
            (click)="toggleMenu()"
            type="button"
            class="hover:text-beige text-gray p-2 focus:outline-none"
            aria-controls="mobile-menu"
            [attr.aria-expanded]="isMobileMenuOpen()"
          >
            <span class="sr-only">Apri menu principale</span>
            @if (!isMobileMenuOpen()) {
              <!-- Icona Hamburger -->
              <svg
                class="h-6 w-6"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            } @else {
              <!-- Icona X (Chiudi) -->
              <svg
                class="h-6 w-6"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            }
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div
    class="absolute top-22 left-0 z-40 w-full origin-top transform px-4 transition-all duration-300 lg:hidden"
    [class.opacity-100]="isMobileMenuOpen()"
    [class.scale-y-100]="isMobileMenuOpen()"
    [class.opacity-0]="!isMobileMenuOpen()"
    [class.scale-y-0]="!isMobileMenuOpen()"
    [class.pointer-events-none]="!isMobileMenuOpen()"
  >
    <div class="overflow-hidden rounded-2xl border border-white/40 bg-white/90 shadow-xl backdrop-blur-xl">
      <div class="flex flex-col items-center space-y-1 px-2 py-6 pt-2 pb-3">
        @for (link of navLinks; track link.href) {
          <a
            [href]="link.href"
            (click)="scrollTo($event, link.href)"
            class="hover:text-beige hover:bg-beige-light text-gray block w-full rounded-md px-3 py-3 text-center text-base font-medium tracking-widest uppercase transition-colors"
            >{{ link.label }}</a
          >
        }
      </div>
    </div>
  </div>
</nav>
