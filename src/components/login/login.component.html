<main class="w-full h-screen flex items-center justify-center font-serif p-4 bg-[#f1ebe5]">
  <div class="w-full max-w-md mx-auto bg-white/50 backdrop-blur-lg rounded-xl shadow-2xl p-8 md:p-12 text-center text-[#5d5d5d] animate-[fadeIn_1.5s_ease-in-out]">
    
    <div class="mb-10">
      <h1 class="font-cursive text-7xl text-[#8d7a6e]">Camilla & Riccardo</h1>
      <p class="text-xl mt-2 tracking-widest text-gray-500">20 | 06 | 2026</p>
    </div>

    <div>
      <h2 class="text-3xl mb-3 text-[#8d7a6e]">Benvenuti</h2>
      <p class="text-gray-600 mb-8 font-sans">Per accedere al sito, inserisci la password che hai ricevuto con l'invito.</p>
      <form (submit)="onSubmit($event)">
        <div class="relative w-full">
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            name="password"
            placeholder="Password" 
            class="font-sans w-full px-4 py-2 text-center bg-transparent border-b border-[#969e7f]/50 focus:border-[#8d7a6e] outline-none transition-colors duration-300 placeholder:text-gray-400 pr-10"
            [class.border-red-500]="hasError()"
            [class.focus:border-red-500]="hasError()"
            required
          />
          <button 
            type="button" 
            (click)="togglePasswordVisibility()"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#8d7a6e] transition-colors p-1 focus:outline-none"
            title="Mostra/Nascondi password">
            @if (showPassword()) {
              <!-- Eye Slash Icon (Hide) -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            } @else {
              <!-- Eye Icon (Show) -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
            }
          </button>
        </div>
        
        @if (hasError()) {
          <p class="text-red-600 text-sm mt-2 font-sans">Password non corretta. Riprova.</p>
        }
        <button 
          type="submit" 
          class="font-sans w-full mt-8 bg-[#969e7f] text-white py-3 rounded-md hover:bg-[#838a6c] shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 tracking-widest uppercase">
          Entra
        </button>
      </form>
    </div>
  </div>
</main>
