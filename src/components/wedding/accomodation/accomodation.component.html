<!-- STAY -->
<section id="accomodation" class="py-20 md:py-32">
  <div class="max-w-4xl mx-auto px-6">
    <div appAnimateOnScroll class="section-to-animate">
      <!-- Changed text color to brown/grey for light background -->
      <h2 class="font-serif text-5xl text-[#8d7a6e] mb-8 text-center">Dove Soggiornare</h2>
      <div class="space-y-6">
        @for (hotel of hotels(); track hotel.name) {
        <div class="border-b border-[#969e7f]/30 pb-4">
          <h3 class="font-serif text-2xl text-[#8d7a6e]">{{ hotel.name }}</h3>
          <p class="mt-1 font-sans italic text-[#5d5d5d]">{{ hotel.description }}</p>
          <div class="flex justify-between items-center mt-2 text-sm">
            <span class="text-[#969e7f]">{{ hotel.distance }}</span>
            <a [href]="hotel.link" target="_blank" class="text-[#8d7a6e] hover:underline">Visita il sito</a>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
</section>
