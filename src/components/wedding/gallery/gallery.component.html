<section id="gallery" appAnimateOnScroll class="section-to-animate bg-white/30 py-20 md:py-32">
  <div class="max-w-5xl mx-auto px-6 text-center">
    <h2 class="font-serif text-5xl text-[#8d7a6e] mb-12">I Nostri Momenti</h2>
    <div class="grid-gallery">
      @for (photo of photos(); track photo.src) {
        <div class="overflow-hidden rounded-lg shadow-lg aspect-w-1 aspect-h-1">
          <img [src]="photo.src" [alt]="photo.alt" class="w-full h-full object-cover transform hover:scale-105 transition-transform duration-500" loading="lazy">
        </div>
      }
    </div>
  </div>
</section>
