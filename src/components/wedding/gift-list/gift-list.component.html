<!-- WEDDING LIST -->
<section id="gift" appAnimateOnScroll class="section-to-animate py-20 md:py-32">
  <div class="max-w-3xl mx-auto px-6 text-center">
    <h2 class="font-serif text-5xl text-[#8d7a6e] mb-8">Lista Nozze</h2>
    <p class="font-sans text-lg leading-relaxed mb-8 italic">La vostra presenza sarà per noi il regalo più grande. Ma se desiderate contribuire a realizzare i nostri sogni, potete farlo con un pensiero per il nostro viaggio di nozze.</p>
    <div class="font-sans text-lg bg-white/50 border border-[#969e7f]/30 inline-block px-8 py-4 rounded-md">
      <p class="tracking-widest">IBAN</p>
      <div class="flex items-center gap-4 mt-1">
        <p class="text-[#8d7a6e] select-all">{{ iban() }}</p>
        <button (click)="copyIban()" title="Copia IBAN" class="text-[#969e7f] hover:text-[#8d7a6e] transition-colors p-1">
          @if (copyState() === 'copied') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-green-600">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
            </svg>
          }
        </button>
      </div>
      <p class="text-sm mt-2">Intestato a: Camilla & Riccardo</p>
    </div>
    <p class="font-serif text-3xl text-[#8d7a6e] mt-12 italic">Grazie di cuore!</p>
  </div>
</section>
