<!-- HERO -->
<header id="home" class="h-screen min-h-[600px] bg-cover bg-center flex flex-col relative">
  <!-- 
    Using NgOptimizedImage with 'priority' tells the browser to load this image ASAP.
    The 'fill' attribute makes it cover the header, similar to a background image.
  -->
  <img 
    ngSrc="https://picsum.photos/id/1043/1920/1280?blur=2" 
    priority 
    fill
    class="hero-image"
    alt="Un paesaggio suggestivo per il matrimonio di Camilla e Riccardo"
  />

  <div class="absolute inset-0 bg-[#8d7a6e]/30"></div>
  
  <!-- <div class="absolute top-6 left-6 z-10">
    <img [src]="logoUrl" alt="Logo C&R" class="w-20 h-auto hero-logo">
  </div> -->
  
  <div class="m-auto text-center text-white z-10 animate-[fadeIn_2s_ease-in-out]">
    <h1 class="font-cursive text-8xl md:text-[10rem] leading-none">Camilla & Riccardo</h1>
    <p class="font-sans text-2xl md:text-3xl tracking-[0.2em] mt-4">20 | 06 | 2026</p>
  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 animate-[fadeIn_2s_ease-in-out_1s_forwards] opacity-0">
    <a href="#details" aria-label="Scorri verso il basso">
     <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-8 h-8 text-white/80 animate-bounce">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
    </a>
  </div>
</header>
