<!-- MAP & STAY -->
<section id="location" class="bg-white/30 py-20 md:py-32">
  <div class="max-w-4xl mx-auto px-6">
    <!-- Come Raggiungerci -->
    <div appAnimateOnScroll class="section-to-animate text-center mb-16 md:mb-24">
      <h2 class="font-serif text-5xl text-[#8d7a6e] mb-8">Come Arrivare</h2>
      <div class="aspect-video w-full overflow-hidden rounded-md shadow-lg border-4 border-white">
        <iframe [src]="mapUrl()" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
      </div>
      <a [href]="mapDirectionsUrl()" target="_blank" class="inline-block mt-8 bg-[#969e7f] text-white font-sans tracking-widest uppercase px-8 py-3 rounded-md hover:bg-[#838a6c] transition-colors duration-300">Apri Indicazioni</a>
    </div>

    <!-- Dove Soggiornare -->
    <div appAnimateOnScroll class="section-to-animate">
      <h2 class="font-serif text-5xl text-[#8d7a6e] mb-8 text-center">Dove Soggiornare</h2>
      <div class="space-y-6">
        @for (hotel of hotels(); track hotel.name) {
        <div class="border-b border-[#969e7f]/30 pb-4">
          <h3 class="font-serif text-2xl text-[#8d7a6e]">{{ hotel.name }}</h3>
          <p class="mt-1 font-sans italic">{{ hotel.description }}</p>
          <div class="flex justify-between items-center mt-2 text-sm">
            <span class="text-[#969e7f]">{{ hotel.distance }}</span>
            <a [href]="hotel.link" target="_blank" class="text-[#8d7a6e] hover:underline">Visita il sito</a>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
</section>
