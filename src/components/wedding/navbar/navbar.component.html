<nav 
  class="w-full transition-all duration-500 transform"
  [class.-translate-y-full]="!isVisible()">
  
  <div class="max-w-5xl mx-auto my-4 px-4 sm:px-6 lg:px-8 relative z-50">
    <div class="bg-white/80 backdrop-blur-md rounded-full shadow-lg border border-white/40 px-6">
      <div class="flex items-center justify-between h-16">
        
        <!-- Logo -->
        <div class="flex items-center">
          <!-- <a href="#home" class="flex-shrink-0" (click)="scrollTo($event, '#home')">
            @if (logoUrl) {
              <img [src]="logoUrl" alt="Logo C&R" class="h-10 w-auto">
            } @else {
              <span class="font-serif text-2xl text-[#8d7a6e] font-bold">C&R</span>
            }
          </a> -->
        </div>

        <!-- Desktop Menu -->
        <div class="hidden lg:block">
          <div class="ml-10 flex items-baseline space-x-1">
            @for (link of navLinks; track link.href) {
              <a [href]="link.href" (click)="scrollTo($event, link.href)" class="whitespace-nowrap text-[#5d5d5d] hover:text-[#8d7a6e] hover:bg-[#f1ebe5]/50 px-3 py-2 rounded-full text-sm font-medium font-sans uppercase tracking-wider transition-colors duration-300">{{ link.label }}</a>
            }
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <div class="lg:hidden flex items-center">
          <button (click)="toggleMenu()" type="button" class="text-[#5d5d5d] hover:text-[#8d7a6e] focus:outline-none p-2" aria-controls="mobile-menu" [attr.aria-expanded]="isMobileMenuOpen()">
            <span class="sr-only">Apri menu principale</span>
            @if (!isMobileMenuOpen()) {
              <!-- Icona Hamburger -->
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            } @else {
              <!-- Icona X (Chiudi) -->
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            }
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div class="lg:hidden absolute top-20 left-0 w-full px-4 z-40 transition-all duration-300 origin-top transform"
       [class.opacity-100]="isMobileMenuOpen()"
       [class.scale-y-100]="isMobileMenuOpen()"
       [class.opacity-0]="!isMobileMenuOpen()"
       [class.scale-y-0]="!isMobileMenuOpen()"
       [class.pointer-events-none]="!isMobileMenuOpen()">
    
    <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-xl border border-white/40 overflow-hidden">
      <div class="px-2 pt-2 pb-3 space-y-1 flex flex-col items-center py-6">
        @for (link of navLinks; track link.href) {
          <a [href]="link.href" (click)="scrollTo($event, link.href)" class="text-[#5d5d5d] hover:text-[#8d7a6e] hover:bg-[#f1ebe5] block px-3 py-3 rounded-md text-base font-medium font-sans uppercase tracking-widest w-full text-center transition-colors">{{ link.label }}</a>
        }
      </div>
    </div>
  </div>
</nav>
