<!-- SCHEDULE -->
<section id="schedule" appAnimateOnScroll class="section-to-animate py-24">
  <div class="max-w-xl mx-auto px-6">
    <div class="text-center mb-16">
      <h2 class="font-serif text-5xl text-white">Il Programma</h2>
    </div>

    <div class="flex flex-col w-full">
      @for (item of schedule(); track item.time; let last = $last) {
        <div class="flex w-full min-h-[100px]">
          
          <!-- Left Column: Title & Time -->
          <!-- Using w-1/2 ensures the border is exactly at 50% width -->
          <div class="w-1/2 pr-4 md:pr-8 py-6 text-right border-r border-white/40 flex flex-col justify-center items-end">
            <h3 class="font-serif text-xl md:text-2xl text-white uppercase tracking-[0.2em] leading-tight break-words max-w-full">
              {{ item.title }}
            </h3>
            <p class="font-cursive text-2xl md:text-3xl text-white/80 mt-1 transform -rotate-2">
              ore {{ item.time }}
            </p>
          </div>

          <!-- Right Column: Icon -->
          <div class="w-1/2 pl-4 md:pl-8 py-6 flex items-center justify-start">
            <div class="text-white opacity-90">
              <!-- SVG con stroke-width sottile per replicare lo stile 'disegnato' -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="0.8" stroke="currentColor" class="w-12 h-12 md:w-14 md:h-14">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
              </svg>
            </div>
          </div>

        </div>
      }
    </div>
    
    <!-- Decorative End Dot -->
    <div class="flex justify-center -mt-[1px]">
        <div class="w-2 h-2 rounded-full bg-white/40"></div>
    </div>

  </div>
</section>
